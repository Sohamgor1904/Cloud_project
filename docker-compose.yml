version: '3.9'

services:
  # ── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: smartwaste_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       smartwaste
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: smartwaste_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smartwaste"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Express API Server ───────────────────────────────────────
  api:
    build: .
    container_name: smartwaste_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     smartwaste
      DB_USER:     postgres
      DB_PASSWORD: smartwaste_dev
      PORT:        3000
      NODE_ENV:    production
    ports:
      - "3000:3000"
    volumes:
      - ./public:/app/public

volumes:
  postgres_data:
    driver: local
