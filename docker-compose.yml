version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: smartwaste-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: smartwaste_password
      POSTGRES_DB: smartwaste
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Exposing the port so you can access it via pgAdmin if needed
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smartwaste"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: smartwaste-web
    restart: always
    ports:
      # Port 80 on host -> Port 3000 in container
      # This allows access via http://<YOUR_EC2_IP>/ directly
      - "80:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=smartwaste
      - DB_USER=postgres
      - DB_PASSWORD=smartwaste_password
      - DATABASE_URL=postgresql://postgres:smartwaste_password@db:5432/smartwaste
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
